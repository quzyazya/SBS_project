services:
  db:
    image: postgres:15
    container_name: sbs_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_NAME:-sbs_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sbs_redis
    ports:
      - "6379:6379"                        # ← исправлено: было "6379-6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  web:
    build: .
    container_name: sbs_web
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:                               # ← исправлено: было redis без condition
        condition: service_started
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_NAME: ${DB_NAME:-sbs_db}
      REDIS_URL: redis://redis:6379/0       # ← добавлено
      SECRET_KEY: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
    volumes:
      - .:/app

volumes:
  postgres_data:
  redis_data:                              # ← добавлено